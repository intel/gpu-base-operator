name: validation common
on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string

permissions:
  pull-requests: read # for golangci/golangci-lint-action to fetch pull requests
  contents: read

env:
  isubuntu: ${{ startsWith (inputs.runner, 'ubuntu') }}

jobs:
  generated:
    name: Check generated files are in sync
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: |
          make check-generated-files
  golangci:
    name: Run lint
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: |
          make lint
  build:
    name: Build all
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: make build
      - run: make docker-build
      - name: Run Trivy for operator image (json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          scan-ref: ghcr.io/intel/intel-gpu-base-operator:devel
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          output: operator-image-vulnerabilities.json
      - name: Run Trivy for go.mod (json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: go.mod
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          output: go.mod-vulnerabilities.json
          list-all-pkgs: true
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store image reports as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-vulnerabilities
          path: |
            trivyignore.yaml
            operator-image-vulnerabilities.json
            go.mod-vulnerabilities.json
          retention-days: 14

  tests:
    name: Run tests
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: Run tests
        run: |
          make envtest
          make test
  goverify:
    name: Run golang verify
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: Run golang mod verify
        run: |
          go mod verify

  trivy_dockerfiles:
    name: Run trivy dockerfile
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - name: Run Trivy for dockerfiles
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: build/
          format: table
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy for dockerfiles (json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: always()
        with:
          scan-type: config
          scan-ref: build/
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-dockerfiles.json
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store dockerfile analysis report as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-dockerfiles-json
          path: |
            trivy-dockerfiles.json
            trivyignore.yaml
          retention-days: 14

  trivy_deployments:
    name: Run trivy deployments
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          clean: true
      - name: Run Trivy for deployments
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: config/deployments
          format: table
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
      - name: Run Trivy for deployments (json)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: always()
        with:
          scan-type: config
          scan-ref: config/deployments
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-deployments.json
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store vulnerability report as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-deployments-json
          path: |
            trivy-deployments.json
            trivyignore.yaml
          retention-days: 14
