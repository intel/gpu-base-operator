name: validation common
on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string

permissions:
  pull-requests: read # for golangci/golangci-lint-action to fetch pull requests
  contents: read

env:
  isubuntu: ${{ startsWith (inputs.runner, 'ubuntu') }}

jobs:
  generated:
    name: Check generated files are in sync
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: |
          make check-generated-files
  golangci:
    name: Run lint
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: |
          make lint
  build:
    name: Build all
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - run: make build
      - run: IMG=ghcr.io/intel/intel-gpu-base-operator:trivy make operator-build
      - name: Run Trivy for operator image (json)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          scan-ref: ghcr.io/intel/intel-gpu-base-operator:trivy
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          output: operator-image-vulnerabilities.json
      - name: Run Trivy for go.mod (json)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: go.mod
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          output: go.mod-vulnerabilities.json
          list-all-pkgs: true
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store image reports as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-vulnerabilities
          path: |
            trivyignore.yaml
            operator-image-vulnerabilities.json
            go.mod-vulnerabilities.json
          retention-days: 14

  tests:
    name: Run tests
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: Run tests
        run: |
          make envtest
          make test
  goverify:
    name: Run golang verify
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false
      - name: Run golang mod verify
        run: |
          go mod verify

  trivy_dockerfiles:
    name: Run trivy dockerfile
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - name: Run Trivy for dockerfiles
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: build/
          format: table
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy for dockerfiles (json)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        if: always()
        with:
          scan-type: config
          scan-ref: build/
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-dockerfiles.json
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store dockerfile analysis report as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: trivy-dockerfiles-json
          path: |
            trivy-dockerfiles.json
            trivyignore.yaml
          retention-days: 14

  trivy_deployments:
    name: Run trivy deployments
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          clean: true
      - name: Run Trivy for deployments
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: config/deployments
          format: table
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
      - name: Run Trivy for deployments (json)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        if: always()
        with:
          scan-type: config
          scan-ref: config/deployments
          format: json
          trivy-config: trivy.yaml
          exit-code: 1
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-deployments.json
      - run: |
          cp .trivyignore.yaml trivyignore.yaml
      - name: Store vulnerability report as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: trivy-deployments-json
          path: |
            trivy-deployments.json
            trivyignore.yaml
          retention-days: 14
