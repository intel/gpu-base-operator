# Default values for gpu-base-operator.

createNamespace: true

nfd:
  install: false

operator:
  image:
    repository: ghcr.io/intel/intel-gpu-base-operator:devel
    pullPolicy: IfNotPresent
  verbosity: 2
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

privateRegistry:
  url: ""
  user: ""
  token: ""

kueue:
  install: false
  controllerManager:
    featureGates:
    - name: KueueDRAIntegrationExtendedResource
      enabled: true
  managerConfig:
    # -- controller_manager_config.yaml.
    # ControllerManager utilizes this yaml via manager-config Configmap.
    # @default -- controllerManagerConfigYaml
    controllerManagerConfigYaml: |-
      apiVersion: config.kueue.x-k8s.io/v1beta2
      kind: Configuration
      clientConnection:
        burst: 100
        qps: 50
      controller:
        groupKindConcurrency:
          ClusterQueue.kueue.x-k8s.io: 1
          Job.batch: 5
          LocalQueue.kueue.x-k8s.io: 1
          Pod: 5
          ResourceFlavor.kueue.x-k8s.io: 1
          Workload.kueue.x-k8s.io: 5
      health:
        healthProbeBindAddress: :8081
      integrations:
        frameworks:
        - batch/job
        - kubeflow.org/mpijob
        - ray.io/rayjob
        - ray.io/rayservice
        - ray.io/raycluster
        - jobset.x-k8s.io/jobset
        - trainer.kubeflow.org/trainjob
        - kubeflow.org/paddlejob
        - kubeflow.org/pytorchjob
        - kubeflow.org/tfjob
        - kubeflow.org/xgboostjob
        - kubeflow.org/jaxjob
        - workload.codeflare.dev/appwrapper
        - pod
        - deployment
        - statefulset
        - leaderworkerset.x-k8s.io/leaderworkerset
      leaderElection:
        leaderElect: true
        resourceName: c1f6bfd2.kueue.x-k8s.io
      metrics:
        bindAddress: :8443
      webhook:
        port: 9443
      resources:
        deviceClassMappings:
        - deviceClassNames:
          - "gpu.intel.com"
          name: "dra.gpu.intel.com"
